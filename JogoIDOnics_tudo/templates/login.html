<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — JogoIDOnics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #1a2332;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 380px;
            border-radius: 16px;
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,.35);
        }
        .login-brand {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a2332;
        }
        .login-brand span { color: #4da6ff; }
    </style>
</head>
<body>
<div class="card login-card p-4">
    <div class="card-body">
        <div class="text-center mb-4">
            <div class="login-brand">
                <i class="bi bi-controller"></i> Jogo<span>IDOnics</span>
            </div>
            <small class="text-muted">Plataforma de gamificação — Grupo SOCEM</small>
        </div>

        {% with msgs = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in msgs %}
            <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
            {% endfor %}
        {% endwith %}

        <form method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Utilizador</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control"
                           placeholder="utilizador" autofocus required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="senha" class="form-control"
                           placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
