<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário de Almoços – Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 380px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    h1 {
      color: #ffffff;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    p.subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      text-align: left;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
    }

    input[type="password"]::placeholder { color: rgba(255,255,255,0.3); }

    input[type="password"]:focus {
      border-color: #e94560;
      background: rgba(255,255,255,0.12);
    }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover  { opacity: 0.9; }
    button:active { transform: scale(0.98); }

    .error {
      background: rgba(233, 69, 96, 0.2);
      border: 1px solid rgba(233, 69, 96, 0.5);
      color: #ff8a9a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🍽️</div>
    <h1>Calendário de Almoços</h1>
    <p class="subtitle">Acesso restrito — introduza a password</p>

    {% if error %}
      <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••••" autofocus autocomplete="current-password" />
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
