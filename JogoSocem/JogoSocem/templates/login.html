<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — WorkScore SOCEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="text-6xl mb-3">🎮</div>
            <h1 class="text-3xl font-black text-gray-800">WorkScore</h1>
            <p class="text-gray-500 mt-1">SOCEM — Sistema de Pontos</p>
        </div>

        <!-- Erro -->
        {% if erro %}
        <div class="mb-6 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm font-medium">
            ⚠️ {{ erro }}
        </div>
        {% endif %}

        <!-- Formulário -->
        <form method="POST" action="/login" class="space-y-5">
            <input type="hidden" name="next" value="{{ next }}">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Utilizador</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-gray-800
                              focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none
                              transition-all placeholder-gray-400"
                       placeholder="nome de utilizador">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-gray-800
                              focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none
                              transition-all placeholder-gray-400"
                       placeholder="••••••••">
            </div>

            <button type="submit"
                    class="w-full py-3 bg-gradient-to-r from-purple-600 to-indigo-600
                           text-white font-bold rounded-xl text-lg
                           hover:from-purple-700 hover:to-indigo-700
                           transition-all shadow-lg hover:shadow-xl">
                Entrar →
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-8">
            © 2026 SOCEM · WorkScore
        </p>
    </div>

</body>
</html>
