<!DOCTYPE html>
<html>
<head>
    <title>SOCEM Language</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="text-center">

        <div class="text-center">
            <img src="/static/imagens/socem_.jpg"
                 alt="SOCEM"
                 style="max-height: 110px; margin-top: -400px;">
        </div>

        <h1 style="margin-bottom: 200px; color: #E01F26; font-weight: bold;">
            Welcome to SOCEM
        </h1>


        <h5 style="margin-bottom: 25px; position: relative; top: -30px;">
            Selecione Idioma / Select Language
        </h5>


        <form method="post" action="/set-language" class="d-flex gap-4 justify-content-center mt-4">

            <button type="submit" name="lang" value="pt"
                    class="btn btn-danger btn-lg px-4 py-3 d-flex align-items-center gap-3">

                <img src="/static/imagens/pt.png"
                     width="35"
                     style="border-radius:6px;">

                <span>Português</span>
            </button>

            <button type="submit" name="lang" value="en"
                    class="btn btn-danger btn-lg px-4 py-3 d-flex align-items-center gap-3">

                <img src="/static/imagens/gb.png"
                     width="35"
                     style="border-radius:6px;">

                <span>English</span>
            </button>

        </form>

    </div>

</body>
</html>
