<!DOCTYPE html>
<html lang="{{ request.cookies.get('lang', 'pt') }}">
<head>
    <meta charset="UTF-8">
    <title>{{ title or textos.app_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- AutoComplete.js CDN + CSS (para registo forms) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.9/dist/css/autoComplete.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.9/dist/autoComplete.min.js"></script>
    <style>
        /* MATAR BOOTSTRAP EM BTN-SOCEM-GROUP */
        .btn-primary.btn-socem-group,
        .btn.btn-primary.btn-socem-group {
            background-color: #E01F26 !important;
            border-color: #E01F26 !important;
        }

            /* ATIVO - MÁXIMA PRIORIDADE */
            .btn-primary.btn-socem-group.active,
            .btn.btn-primary.btn-socem-group.active {
                background-color: #E01F26 !important;
                border-color: #E01F26 !important;
                box-shadow: 0 4px 12px rgba(13,71,161,0.4) !important;
            }

                /* CHECKMARK */
                .btn-primary.btn-socem-group.active::after {
                    content: '✓';
                    position: absolute;
                    right: 8px;
                    top: 50%;
                    transform: translateY(-50%);
                    background: white;
                    border-radius: 50%;
                    width: 20px;
                    height: 20px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 12px;
                    font-weight: bold;
                    color: #E01F26;
                }
    </style>

    <style>
        body {
            background-color: #f5f5f5;
        }

        .btn-socem {
            background-color: #00a9f4;
            color: white;
            font-weight: bold;
        }

            .btn-socem:hover {
                background-color: #0086c1;
            }

        .grid-header {
            background-color: #00a9f4;
            color: white;
            font-weight: bold;
        }

        .main-row {
            min-height: 70vh;
        }

        /* AutoComplete custom */
        .autocomplete {
            position: relative;
        }

            .autocomplete ul.dropdown-menu {
                background: white;
                border: 1px solid #ddd;
                border-radius: 0.375rem;
                box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
                max-height: 200px;
                overflow-y: auto;
            }

        .dropdown-item:hover {
            background: #f8f9fa;
        }

        .btn-checkin:disabled,
        .btn-checkin[style*="not-allowed"] {
            opacity: 0.5 !important;
            cursor: not-allowed !important;
            pointer-events: none !important;
        }

        .btn-checkin.active {
            opacity: 1 !important;
            cursor: pointer !important;
        }

        .btn-checkin:disabled {
            opacity: 0.6;
        }

        /* BOTÕES GRUPO - FUNCIONA COM QUALQUER COMBINAÇÃO DE CLASSES */
        .btn-socem-group {
            background-color: #0d6efd !important; /* AZUL CLARO */
            border-color: #0d6efd !important;
            color: white !important;
            height: 90px !important;
            width: 200px !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            font-size: 0.85rem !important;
            font-weight: bold !important;
            line-height: 1.4 !important;
            padding: 0.5rem !important;
            margin: 0 2px !important;
            border-radius: 8px !important;
            position: relative !important;
            overflow: hidden !important;
            transition: all 0.3s ease !important;
        }

            /* HOVER */
            .btn-socem-group:hover:not(.active) {
                background-color: #9e161b !important;
                border-color: #9e161b !important;
                transform: translateY(-1px) !important;
            }

            /* ATIVO = AZUL ESCURO (CORRIGIDO) */
            .btn-socem-group.active {
                background-color: #0d47a1 !important; /* ← AQUI ESTAVA rgba(0,0,0,0.15) ERRADO */
                border-color: #01579b !important;
                box-shadow: 0 6px 20px rgba(13,71,161,0.5) !important;
                transform: translateY(-2px) scale(1.02) !important;
            }

                /* CHECKMARK */
                .btn-socem-group.active::after {
                    content: '✓' !important;
                    position: absolute !important;
                    right: 8px !important;
                    top: 50% !important;
                    transform: translateY(-50%) !important;
                    background: rgba(255,255,255,0.95) !important;
                    border-radius: 50% !important;
                    width: 20px !important;
                    height: 20px !important;
                    display: flex !important;
                    align-items: center !important;
                    justify-content: center !important;
                    font-size: 12px !important;
                    font-weight: bold !important;
                    color: #0d47a1 !important;
                }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS (fim body para performance) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
