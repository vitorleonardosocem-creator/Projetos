<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Departamento - GSME D</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white text-center py-4">
                        <h2 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Novo Departamento</h2>
                    </div>
                    <form method="POST" action="/departamentos/nova">
                        <div class="card-body p-5">
                            <div class="mb-4">
                                <label class="form-label fw-bold">👤 Utilizador: {{ user_nome }} ({{ user }})</label>
                            </div>

                            <div class="mb-4">
                                <label for="nome" class="form-label fw-bold">Nome do Departamento <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-lg" id="nome" name="nome" required maxlength="50">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="empresa_id" class="form-label fw-bold">Empresa <span class="text-danger">*</span></label>
                                    <select class="form-select form-select-lg" id="empresa_id" name="empresa_id" required>
                                        <option value="">Selecione...</option>
                                        {% for emp in empresas %}
                                        <option value="{{ emp.IdEmpresa }}">{{ emp.Nome }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid gap-3 d-md-flex justify-content-end mt-5">
                                <a href="/departamentos" class="btn btn-outline-secondary btn-lg">
                                    <i class="fas fa-arrow-left me-2"></i>Cancelar
                                </a>
                                <button type="submit" class="btn btn-success btn-lg px-5">
                                    <i class="fas fa-save me-2"></i> Criar Departamento
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
