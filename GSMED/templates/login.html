<!DOCTYPE html>
<html>
<head>
    <title>GSMED Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h2>Login GSMED</h2>
            <form method="post" action="/do_login">
                <div class="mb-3">
                    <input name="username" class="form-control" placeholder="" value="admin">
                </div>
                <div class="mb-3">
                    <input name="password" type="password" class="form-control" placeholder="" value="admin123">
                </div>
                <button class="btn btn-primary w-100">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
