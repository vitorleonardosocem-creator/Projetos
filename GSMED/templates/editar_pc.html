<!DOCTYPE html>
<html lang="pt">
<head>
    <title>✏️ Editar PC - GSMED v2.4</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #ec4899 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

            .card-header::before {
                content: '';
                position: absolute;
                top: -50%;
                right: -50%;
                width: 200%;
                height: 200%;
                background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
                animation: float 6s ease-in-out infinite;
            }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            position: relative;
            z-index: 2;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin: 0;
            position: relative;
            z-index: 2;
        }

        .form-section {
            padding: 40px 30px;
        }

        .form-floating {
            margin-bottom: 25px;
        }

            .form-floating > .form-control,
            .form-floating > .form-select {
                border-radius: 20px;
                border: 2px solid #e5e7eb;
                padding: 18px 25px;
                font-size: 1rem;
                background: rgba(255,255,255,0.9);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                height: 65px;
                font-weight: 500;
            }

                .form-floating > .form-control:focus,
                .form-floating > .form-select:focus {
                    border-color: #667eea;
                    box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.15);
                    transform: translateY(-2px);
                }

        /* ESTADO ESPECIAL - SOCEM */
        .form-select[name="estado"] {
            border: 3px solid #e8f5e8 !important;
            font-size: 1.15rem;
            background: linear-gradient(135deg, #e8f5e8, #d4edda) !important;
            font-weight: 700;
            height: 72px;
        }

            .form-select[name="estado"]:focus {
                border-color: #28a745 !important;
                box-shadow: 0 0 0 0.3rem rgba(40, 167, 69, 0.2) !important;
                transform: translateY(-3px);
            }

            .form-select[name="estado"] option[value="EmUso"] {
                background: #d4edda !important;
                color: #155724 !important;
                font-weight: 700;
            }

            .form-select[name="estado"] option[value="Stock"] {
                background: #fff3cd !important;
                color: #856404 !important;
                font-weight: 700;
            }

            .form-select[name="estado"] option[value="Reparacao"] {
                background: #cce5ff !important;
                color: #004085 !important;
                font-weight: 700;
            }

            .form-select[name="estado"] option[value="Abatido"] {
                background: #f8d7da !important;
                color: #721c24 !important;
                font-weight: 700;
            }

        .form-floating > label {
            font-weight: 600;
            color: #6b7280;
        }

        .row.g-4 > div {
            animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

            .row.g-4 > div:nth-child(1) {
                animation-delay: 0.1s;
            }

            .row.g-4 > div:nth-child(2) {
                animation-delay: 0.15s;
            }

            .row.g-4 > div:nth-child(3) {
                animation-delay: 0.2s;
            }

            .row.g-4 > div:nth-child(4) {
                animation-delay: 0.25s;
            }

            .row.g-4 > div:nth-child(5) {
                animation-delay: 0.3s;
            }

            .row.g-4 > div:nth-child(6) {
                animation-delay: 0.35s;
            }

        @keyframes slideInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-group {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            padding: 30px;
            border-radius: 25px;
            border: 2px dashed #667eea;
            margin-top: 40px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: none;
            border-radius: 20px;
            padding: 18px 50px;
            font-weight: 700;
            font-size: 1.15rem;
            box-shadow: 0 12px 35px rgba(40, 167, 69, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 220px;
        }

            .btn-primary:hover {
                transform: translateY(-4px);
                box-shadow: 0 20px 45px rgba(40, 167, 69, 0.5);
            }

        .btn-secondary {
            border-radius: 20px;
            padding: 18px 40px;
            font-weight: 600;
            border: 2px solid #d1d5db;
            font-size: 1.1rem;
            min-width: 180px;
            transition: all 0.3s;
        }

            .btn-secondary:hover {
                background: #f3f4f6;
                transform: translateY(-3px);
                box-shadow: 0 10px 30px rgba(0,0,0,0.15);
                border-color: #667eea;
                color: #667eea;
            }

        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }

            .header-title {
                font-size: 2rem;
            }

            .form-section {
                padding: 30px 20px;
            }

            .btn-group {
                margin-top: 30px;
                padding: 25px 20px;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1 class="header-title">
                    <i class="fas fa-edit me-4"></i>Editar PC
                </h1>
                <p class="header-subtitle">
                    🏷️ <strong>{{ pc.TagInterna or 'Novo PC' }}</strong> |
                    ID: <strong>#{{ pc.IdPC }}</strong>
                </p>
            </div>

            <div class="form-section">
                <form id="editarPcForm" method="POST" action="/computadores/{{ pc.IdPC }}/atualizar">
                    <input type="hidden" name="user_param" value="{{ user_param }}">

                    <div class="row g-4">
                        <!-- Tag (readonly) -->
                        <div class="col-md-3">
                            <div class="form-floating">
                                <input type="text" class="form-control" value="{{ pc.TagInterna or '' }}" readonly style="background: linear-gradient(135deg, #f8f9fa, #e9ecef); font-weight: 700; font-size: 1.1rem; color: #667eea;">
                                <label>🏷️ Tag Interna</label>
                            </div>
                        </div>

                        <!-- TipoPC + Utilizador -->
                        <div class="col-md-3">
                            <div class="form-floating">
                                <select class="form-select" name="tipo_pc">
                                    <option value="">Tipo PC</option>
                                    <option value="Desktop" {% if pc.TipoPC=='Desktop' %}selected{% endif %}>🖥️ Desktop</option>
                                    <option value="Portátil" {% if pc.TipoPC=='Portátil' %}selected{% endif %}>💻 Portátil</option>
                                    <option value="Servidor" {% if pc.TipoPC=='Servidor' %}selected{% endif %}>🖥️ Servidor</option>
                                    <option value="All-in-One" {% if pc.TipoPC=='All-in-One' %}selected{% endif %}>🖥️ All-in-One</option>
                                </select>
                                <label>📱 Tipo PC</label>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="utilizador" value="{{ pc.Utilizador or '' }}" placeholder="Nome do utilizador">
                                <label>👤 Utilizador</label>
                            </div>
                        </div>

                        <div class="col-md-2">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="cpu" value="{{ pc.CPU or '' }}" style="font-family: 'Courier New', monospace;">
                                <label>🧠 CPU</label>
                            </div>
                        </div>

                        <!-- Empresa + Departamento -->
                        <div class="col-md-6">
                            <div class="form-floating">
                                <select class="form-select" name="id_empresa">
                                    <option value="">Selecionar Empresa</option>
                                    {% for emp in empresas %}
                                    <option value="{{ emp.id }}" {% if pc.IdEmpresa==emp.id %}selected{% endif %}>
                                        {{ emp.nome }}
                                    </option>
                                    {% endfor %}
                                </select>
                                <label>🏢 Empresa</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <select class="form-select" name="id_departamento">
                                    <option value="">Selecionar Departamento</option>
                                    {% for dept in departamentos %}
                                    <option value="{{ dept.id }}" {% if pc.IdDepartamento==dept.id %}selected{% endif %}>
                                        {{ dept.empresa_nome }} - {{ dept.nome }}
                                    </option>
                                    {% endfor %}
                                </select>
                                <label>🏭 Departamento</label>
                            </div>
                        </div>

                        <!-- RAM_GB + GPU -->
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="number" class="form-control" name="ram_gb" value="{{ pc.RAM_GB or '' }}" min="0" max="1000" step="1">
                                <label>💾 RAM (GB)</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="gpu" value="{{ pc.GPU or '' }}">
                                <label>🎮 GPU</label>
                            </div>
                        </div>

                        <!-- Datas -->
                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="date" class="form-control" name="data_formatacao" value="{{ pc.DataFormatacao or '' }}">
                                <label>🛠️ Data Formatação</label>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="date" class="form-control" name="data_manutencao" value="{{ pc.DataManutencao or '' }}">
                                <label>🔧 Data Manutenção</label>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="date" class="form-control" name="data_aquisicao" value="{{ pc.DataAquisicao or '' }}">
                                <label>📅 Data Aquisição</label>
                            </div>
                        </div>

                        <!-- CapDisco_GB + SO -->
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="number" class="form-control" name="cap_disco_gb" value="{{ pc.CapDisco_GB or '' }}" min="0" step="1">
                                <label>💽 Cap. Disco (GB)</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="so" value="{{ pc.SO or '' }}" style="font-family: 'Courier New', monospace;">
                                <label>🖥️ Sistema Operativo</label>
                            </div>
                        </div>

                        <!-- Anydesk + Hostname -->
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="anydesk" value="{{ pc.Anydesk or '' }}" style="font-family: 'Courier New', monospace; font-size: 1.1rem;">
                                <label>🖥️ Anydesk ID</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="hostname" value="{{ pc.Hostname or '' }}" style="font-family: 'Courier New', monospace;">
                                <label>🌐 Hostname</label>
                            </div>
                        </div>

                        <!-- ESTADO CORRIGIDO + Observações -->
                        <div class="col-md-4">
                            <div class="form-floating">
                                <select class="form-select" name="estado">
                                    <option value="EmUso" {% if pc.Estado=='EmUso' %}selected{% endif %}>✅ Em Uso</option>
                                    <option value="Stock" {% if pc.Estado=='Stock' %}selected{% endif %}>📦 Stock</option>
                                    <option value="Reparacao" {% if pc.Estado=='Reparacao' %}selected{% endif %}>🔧 Reparação</option>
                                    <option value="Abatido" {% if pc.Estado=='Abatido' %}selected{% endif %}>❌ Abatido</option>
                                </select>
                                <label style="font-weight: 700; color: #28a745;">📊 Estado</label>
                            </div>
                        </div>

                        <div class="col-md-8">
                            <div class="form-floating">
                                <textarea class="form-control" name="observacoes" rows="3" style="height: 110px; border-radius: 20px; font-size: 1rem;">{{ pc.Observacoes or '' }}</textarea>
                                <label>📝 Observações</label>
                            </div>
                        </div>

                        <!-- Botões -->
                        <div class="col-12">
                            <div class="btn-group text-center">
                                <button type="submit" class="btn btn-primary btn-lg me-4">
                                    <i class="fas fa-save me-2"></i>💾 Guardar Alterações
                                </button>
                                <a href="/computadores?user={{ user_param }}" class="btn btn-secondary btn-lg">
                                    <i class="fas fa-arrow-left me-2"></i>↩ Voltar à Lista
                                </a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Validação melhorada
        document.getElementById('editarPcForm').addEventListener('submit', function (e) {
            const tag = document.querySelector('input[readonly]').value;
            const estado = document.querySelector('select[name="estado"]').value;

            if (!confirm(`⚠️ Confirmar alterações no PC ${tag}?\n\nEstado atualizado: ${estado}`)) {
                e.preventDefault();
                return false;
            }

            // Loading button
            const btn = this.querySelector('button[type="submit"]');
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Guardando...';
            btn.disabled = true;
        });

        // Auto-format hostname
        document.querySelector('input[name="hostname"]').addEventListener('blur', function () {
            this.value = this.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
        });

        // Focus primeiro campo editável
        document.querySelector('select[name="tipo_pc"]').focus();
    </script>
</body>
</html>
