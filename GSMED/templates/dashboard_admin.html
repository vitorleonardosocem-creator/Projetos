<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - GSMed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .stat-card {
            height: 120px;
            border-radius: 15px;
        }

        .stat-icon {
            font-size: 2.5rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-4">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <h1 class="fw-bold text-primary mb-1">
                                    <i class="fas fa-tachometer-alt me-3"></i>Dashboard Admin
                                </h1>
                                <h6 class="text-muted mb-0">{{ user_nome }}</h6>
                            </div>
                            <div class="col-md-4 text-md-end">
                                <a href="/computadores" class="btn btn-outline-primary me-2">
                                    <i class="fas fa-laptop me-1"></i>PCs
                                </a>
                                <a href="/utilizadores" class="btn btn-outline-info">
                                    <i class="fas fa-users me-1"></i>Utilizadores
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row mb-5">
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="card bg-primary text-white stat-card">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-laptop fa-2x text-white-50 me-3 stat-icon"></i>
                        <div>
                            <h3 class="fw-bold mb-0">{{ stats.total_pcs }}</h3>
                            <small>Total PCs</small>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="card bg-success text-white stat-card">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-play-circle fa-2x text-white-50 me-3 stat-icon"></i>
                        <div>
                            <h3 class="fw-bold mb-0">{{ stats.em_uso }}</h3>
                            <small>Em Uso</small>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="card bg-warning text-white stat-card">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-box fa-2x text-white-50 me-3 stat-icon"></i>
                        <div>
                            <h3 class="fw-bold mb-0">{{ stats.stock }}</h3>
                            <small>Stock</small>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="card bg-danger text-white stat-card">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-trash fa-2x text-white-50 me-3 stat-icon"></i>
                        <div>
                            <h3 class="fw-bold mb-0">{{ stats.abatido }}</h3>
                            <small>Abatido</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-md-6 mb-4">
                <div class="card shadow-lg">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0"><i class="fas fa-users me-2"></i>Utilizadores</h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-6 border-end">
                                <h3 class="fw-bold text-success">{{ stats.users_ativos }}</h3>
                                <small class="text-muted">Ativos</small>
                            </div>
                            <div class="col-6">
                                <h3 class="fw-bold text-danger">{{ stats.users_inativos }}</h3>
                                <small class="text-muted">Inativos</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card shadow-lg">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0"><i class="fas fa-chart-pie me-2"></i>Estados PCs</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="pieChart" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Gráfico Pizza Estados PCs
        const ctx = document.getElementById('pieChart').getContext('2d');
        const pieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: [{% for estado in estados_pie %}'{{ estado[0] }}',{% endfor %}],
                datasets: [{
                    data: [{% for estado in estados_pie %}{{ estado[1] }},{% endfor %}],
                    backgroundColor: ['#28a745', '#ffc107', '#dc3545', '#17a2b8', '#6f42c1']
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    </script>
</body>
</html>
