<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if empresa %}Editar Empresa{% else %}Nova Empresa{% endif %} - GSMed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white text-center py-3">
                        <h3 class="mb-0">
                            <i class="fas fa-building me-2"></i>
                            {% if empresa %}Editar Empresa{% else %}Nova Empresa{% endif %}
                        </h3>
                    </div>
                    <div class="card-body p-4">
                        <form method="post" action="{% if empresa %}/empresas/editar/{{ empresa.IdEmpresa }}{% else %}/empresas/nova{% endif %}">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nome *</label>
                                <input type="text" name="nome" class="form-control" required
                                       value="{{ empresa.Nome if empresa else '' }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">NIF</label>
                                <input type="text" name="nif" class="form-control"
                                       value="{{ empresa.NIF if empresa and empresa.NIF else '' }}">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Estado</label>
                                <select name="ativo" class="form-select">
                                    <option value="1" {% if not empresa or empresa.Ativo %}selected{% endif %}>Ativo</option>
                                    <option value="0" {% if empresa and not empresa.Ativo %}selected{% endif %}>Inativo</option>
                                </select>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="/empresas" class="btn btn-outline-secondary">
                                    <i class="fas fa-arrow-left me-1"></i>Voltar
                                </a>
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-save me-1"></i>Guardar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
