<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Departamento - GSME D</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                {% if departamento %}
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-warning text-dark text-center py-4">
                        <h2 class="mb-0"><i class="fas fa-edit me-2"></i>Editar Departamento</h2>
                        <p class="mb-0 opacity-75">ID: {{ departamento.IdDepartamento }} - {{ departamento.Nome }}</p>
                    </div>
                    <form method="POST" action="/departamentos/editar/{{ departamento.IdDepartamento }}">
                        <div class="card-body p-5">
                            <div class="mb-4">
                                <label class="form-label fw-bold">👤 Utilizador: {{ user_nome }} ({{ user }})</label>
                            </div>

                            <input type="hidden" name="id" value="{{ departamento.IdDepartamento }}">

                            <div class="mb-4">
                                <label for="nome" class="form-label fw-bold">Nome do Departamento <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-lg" id="nome" name="nome"
                                       value="{{ departamento.Nome }}" required maxlength="50">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="empresa_id" class="form-label fw-bold">Empresa <span class="text-danger">*</span></label>
                                    <select class="form-select form-select-lg" id="empresa_id" name="id_empresa" required>
                                        <option value="">Selecione...</option>
                                        {% for emp in empresas %}
                                        <option value="{{ emp.IdEmpresa }}" {% if emp.IdEmpresa==departamento.IdEmpresa %}selected{% endif %}>
                                            {{ emp.Nome }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <!-- ✅ ATIVO TOGGLE -->
                            <div class="mb-5">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="ativo" name="ativo"
                                           value="1" {% if departamento.Ativo %}checked{% endif %}>
                                    <label class="form-check-label fw-bold fs-5" for="ativo">
                                        <i class="fas fa-toggle-on text-success me-2"></i>Departamento Ativo
                                    </label>
                                </div>
                            </div>

                            <div class="d-grid gap-3 d-md-flex justify-content-end mt-5">
                                <a href="/departamentos" class="btn btn-outline-secondary btn-lg">
                                    <i class="fas fa-arrow-left me-2"></i>Cancelar
                                </a>
                                <button type="submit" class="btn btn-warning btn-lg px-5">
                                    <i class="fas fa-save me-2"></i> Guardar Alterações
                                </button>
                            </div>
                        </div>
                    </form>

                </div>
                {% else %}
                <div class="alert alert-danger text-center">
                    <i class="fas fa-exclamation-triangle fa-2x mb-3"></i>
                    <h4>Departamento não encontrado</h4>
                    <a href="/departamentos" class="btn btn-primary">← Voltar à Lista</a>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
