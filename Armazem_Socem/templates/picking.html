{% extends "base.html" %}
{% block title %}Picking Scanner{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">📱 Picking Scanner</h1>
    <div>
        <button id="toggleScanner" class="btn btn-success me-2">🎥 Iniciar Câmera</button>
        <a href="/" class="btn btn-secondary">🏠 Dashboard</a>
    </div>
</div>

<div class="row">
    <!-- Scanner de Câmera -->
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5>🔍 Scanner Automático</h5>
            </div>
            <div class="card-body text-center p-4">
                <video id="videoScanner" style="width:100%; max-width:500px; border:3px solid #007bff; border-radius:10px;" autoplay muted></video>
                <canvas id="canvasScanner" style="display:none;"></canvas>
                <div id="status" class="mt-3 fs-5 text-muted">Clique "Iniciar Câmera"</div>
            </div>
        </div>
    </div>

    <!-- Controles Manuais -->
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h5>⌨️ Input Manual</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Código de Barras</label>
                    <input type="text" id="codigoInput" class="form-control form-control-lg" placeholder="Escreva ou leia...">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mover para:</label>
                    <select id="localizacaoSelect" class="form-control">
                        <option value="">Selecione...</option>
                    </select>
                </div>
                <button id="confirmarBtn" class="btn btn-success w-100 mb-2" disabled>✅ Confirmar</button>
                <div id="resultado"></div>
            </div>
        </div>
        <div id="scannerControls" class="card mt-3" style="display:none;">
            <div class="card-body text-center p-3 bg-light">
                <div class="btn-group w-100" role="group">
                    <button class="btn btn-outline-danger" onclick="scanner.stopScanner()">⏹️ Parar</button>
                    <button class="btn btn-outline-secondary" onclick="location.reload()">🔄 Reiniciar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/picking.js') }}"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
{% endblock %}
