{% extends "base.html" %}
{% block title %}Editar Utilizador{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">✏️ Editar {{ usuario[1] }}</h1>
    <a href="/usuarios" class="btn btn-secondary">← Voltar</a>
</div>

<form method="POST">
    <div class="card">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nome Completo *</label>
                    <input type="text" class="form-control" name="nome" value="{{ usuario[1] }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" class="form-control" name="email" value="{{ usuario[2] }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tipo *</label>
                    <select class="form-control" name="tipo" required>
                        <option value="operador" {% if usuario[3] == 'operador' %}selected{% endif %}>Operador</option>
                        <option value="admin" {% if usuario[3] == 'admin' %}selected{% endif %}>Administrador</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Estado</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="ativo" id="ativo"
                               {% if usuario[4] %}checked{% endif %}>
                        <label class="form-check-label" for="ativo">
                            Ativo
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div class="card-footer text-end">
            <a href="/usuarios" class="btn btn-secondary me-2">Cancelar</a>
            <button type="submit" class="btn btn-primary">💾 Atualizar</button>
        </div>
    </div>
</form>

<div class="alert alert-info mt-4">
    <strong>💡 Dica:</strong> Para resetar senha, usa o botão "Reset Senha" na lista.
</div>
{% endblock %}
