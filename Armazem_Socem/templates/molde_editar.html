{% extends "base.html" %}
{% block title %}Editar Molde{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between mb-4">
        <h2><i class="fas fa-edit me-2 text-warning"></i>Editar {{ molde[1] }}</h2>
        <a href="/moldes" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Voltar</a>
    </div>

    <form method="POST">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Nome *</label>
                <input type="text" name="nome" class="form-control" value="{{ molde[1] }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Localização</label>
                <select name="localizacao_id" class="form-select">
                    {% for loc in localizacoes %}
                    <option value="{{ loc[0] }}" {% if loc[0] == molde[2] %}selected{% endif %}>
                        {{ loc[1] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Estado *</label>  <!-- ✅ NOVO -->
                <select name="estado" class="form-select" required>
                    <option value="Montagem" {% if molde[4] == 'Montagem' %}selected{% endif %}>
                        🏗️ Montagem
                    </option>
                    <option value="Parcial" {% if molde[4] == 'Parcial' %}selected{% endif %}>
                        ⚠️ Parcial
                    </option>
                    <option value="Finalizado" {% if molde[4] == 'Finalizado' %}selected{% endif %}>
                        ✅ Finalizado
                    </option>
                </select>
            </div>
            <div class="col-md-12">
                <label class="form-label">Observações</label>
                <input type="text" name="observacoes" class="form-control" value="{{ molde[3] or '' }}">
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-success btn-lg">
                <i class="fas fa-save me-2"></i>Atualizar Molde
            </button>
        </div>
    </form>
</div>
{% endblock %}
