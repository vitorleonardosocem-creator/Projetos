<!DOCTYPE html>
<html lang="pt">
<head>
    <title>Imprimir QR Code</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
            background: #f8f9fa;
        }

        img {
            max-width: 300px;
            border: 3px solid #000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .path {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            word-break: break-all;
        }

        @media print {
            body {
                padding: 20px;
                background: white;
            }
        }
    </style>
    <script>
        window.onload = function () {
            window.print();  // Auto-imprime
        }
    </script>
</head>
<body>
    <h2>🖨️ Imprimir QR Code</h2>
    <!-- URL correto: /static/qr_moldes/molde_24.png -->
    <img src="/{{ qr_path }}" alt="QR Code">
    <p class="path">Path: {{ qr_path }}</p>
</body>
</html>
